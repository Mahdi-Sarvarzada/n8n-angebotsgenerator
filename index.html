<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angebotsgenerator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <div class="container">
    <header class="hero">
      <span class="eyebrow">KI-gestütztes Angebotswerkzeug</span>
      <h1>Angebots<em>generator</em></h1>
      <p class="subtitle">Projektbeschreibung eingeben — professionelles Angebot in Sekunden erhalten</p>
    </header>

    <form id="angebotsform" novalidate>
      <div class="form-body">

        <div class="field stagger-1">
          <label for="projektbeschreibung">Projektbeschreibung</label>
          <textarea
            id="projektbeschreibung"
            name="projektbeschreibung"
            rows="5"
            placeholder="Beschreiben Sie Ihr Projekt — Ziel, Umfang, besondere Anforderungen …"
            required
          ></textarea>
        </div>

        <div class="form-row stagger-2">
          <div class="field">
            <label for="stunden">Geschätzte Stunden</label>
            <input type="number" id="stunden" name="stunden" min="1" placeholder="z. B. 40" required />
          </div>
          <div class="field">
            <label for="kundentyp">Kundentyp</label>
            <select id="kundentyp" name="kundentyp" required>
              <option value="" disabled selected>Auswählen …</option>
              <option value="Startup">Startup</option>
              <option value="KMU">KMU</option>
              <option value="Enterprise">Enterprise</option>
              <option value="Privatkunde">Privatkunde</option>
            </select>
          </div>
        </div>

        <div class="stagger-3">
          <button type="submit" id="submitBtn">
            <span class="btn-label">Angebot generieren</span>
            <span class="btn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
        </div>

      </div>
    </form>

    <div id="fehler" class="alert hidden" role="alert">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:2px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5" fill="currentColor"/></svg>
      <span id="fehlerText"></span>
    </div>

    <section id="ergebnis" class="result hidden" aria-live="polite">
      <div class="result-header">
        <span class="result-badge">Angebot</span>
        <span class="result-meta" id="resultMeta"></span>
      </div>
      <div id="angebotsinhalt" class="result-body"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
